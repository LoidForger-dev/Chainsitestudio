<div class="max-w-6xl mx-auto p-4">
  <h2 class="text-3xl font-bold mb-6">Admin Panel</h2>
  <div id="adminContent"></div>
</div>

<script type="module">
  import { getAllOrders, updateOrderStatus } from './js/orders.js';
  import { getWallet } from './js/wallet.js';
  import { ADMIN_WALLETS } from './js/config.js';

  async function loadAdmin() {
    const wallet = getWallet();
    const contentDiv = document.getElementById('adminContent');
    if (!wallet || !ADMIN_WALLETS.includes(wallet)) {
      contentDiv.innerHTML = '<p class="text-red-500">Access denied. Admin wallet not connected.</p>';
      return;
    }

    try {
      const orders = await getAllOrders();
      let html = '<table class="w-full bg-gray-800 rounded-lg"><thead><tr><th>Project</th><th>Wallet</th><th>Payment</th><th>Status</th><th>Action</th></tr></thead><tbody>';
      orders.forEach(order => {
        html += `
          <tr>
            <td>${order.project_name}</td>
            <td>${order.user_wallet.slice(0,6)}...</td>
            <td>${order.payment_status}</td>
            <td>${order.order_status}</td>
            <td>
              <select class="status-select bg-gray-700 p-1 rounded" data-order="${order.id}">
                <option value="new" ${order.order_status === 'new' ? 'selected' : ''}>New</option>
                <option value="in progress" ${order.order_status === 'in progress' ? 'selected' : ''}>In Progress</option>
                <option value="completed" ${order.order_status === 'completed' ? 'selected' : ''}>Completed</option>
              </select>
              <button class="update-btn bg-purple-600 px-2 py-1 rounded text-sm ml-2" data-order="${order.id}">Update</button>
            </td>
          </tr>
        `;
      });
      html += '</tbody></table>';
      contentDiv.innerHTML = html;

      document.querySelectorAll('.update-btn').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          const orderId = e.target.dataset.order;
          const select = document.querySelector(`.status-select[data-order="${orderId}"]`);
          const newStatus = select.value;
          await updateOrderStatus(orderId, newStatus);
          alert('Status updated');
        });
      });
    } catch (err) {
      contentDiv.innerHTML = '<p class="text-red-500">Error loading orders.</p>';
    }
  }

  loadAdmin();
</script>
