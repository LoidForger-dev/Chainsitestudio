<div class="max-w-6xl mx-auto p-4">
  <h2 class="text-3xl font-bold mb-6">My Orders</h2>
  <div id="ordersList" class="space-y-4"></div>
</div>

<script type="module">
  import { getUserOrders } from './js/orders.js';
  import { getWallet } from './js/wallet.js';
  import { payForOrder } from './js/payments.js';

  async function loadOrders() {
    const wallet = getWallet();
    if (!wallet) {
      document.getElementById('ordersList').innerHTML = '<p>Please connect your wallet.</p>';
      return;
    }
    try {
      const orders = await getUserOrders();
      if (orders.length === 0) {
        document.getElementById('ordersList').innerHTML = '<p>No orders yet. <a href="request.html" class="text-purple-400">Create one</a>.</p>';
        return;
      }
      let html = '';
      orders.forEach(order => {
        html += `
          <div class="bg-gray-800 p-4 rounded-lg flex justify-between items-center">
            <div>
              <h3 class="font-bold">${order.project_name}</h3>
              <p>Status: ${order.order_status} | Payment: ${order.payment_status}</p>
            </div>
            <div>
              ${order.payment_status === 'pending' ? `<button class="pay-btn bg-green-600 px-4 py-2 rounded" data-order="${order.id}" data-amount="${order.budget}">Pay ${order.budget} ETH</button>` : ''}
              <a href="?order=${order.id}" class="bg-purple-600 px-4 py-2 rounded ml-2">View</a>
            </div>
          </div>
        `;
      });
      document.getElementById('ordersList').innerHTML = html;

      // Attach pay buttons
      document.querySelectorAll('.pay-btn').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          const orderId = e.target.dataset.order;
          const amount = e.target.dataset.amount;
          try {
            await payForOrder(orderId, amount);
            alert('Payment sent! It may take a moment to confirm.');
            loadOrders(); // refresh
          } catch (err) {
            alert('Payment failed: ' + err.message);
          }
        });
      });
    } catch (err) {
      console.error(err);
    }
  }

  loadOrders();
</script>
